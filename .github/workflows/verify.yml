name: Verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    name: Verify (${{ matrix.os }}, ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.34

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.3
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Verify runner architecture
        run: test "$(node -p 'process.arch')" = "${{ matrix.arch }}"

      - name: Run verification gate
        run: ./scripts/verify.sh
