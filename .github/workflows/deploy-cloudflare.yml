name: Deploy Cloudflare Worker

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install worker dependencies
        run: cd worker && bun install

      - name: Run worker tests
        run: cd worker && bun test

      - name: Install app dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Build cloud renderer
        run: cd app && pnpm build:cloud

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: worker
          wranglerVersion: "4.12.0"

      - name: Smoke test
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WORKER_NAME=$(bun -e '
            import { readFileSync } from "fs";
            const text = readFileSync("worker/wrangler.jsonc", "utf8");
            const stripped = text.replace(/\/\/.*$/gm, "").replace(/\/\*[\s\S]*?\*\//g, "");
            console.log(JSON.parse(stripped).name);
          ')
          SUBDOMAIN=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain" | \
            jq -r '.result.subdomain')
          URL="https://$WORKER_NAME.$SUBDOMAIN.workers.dev"
          echo "Smoke-testing $URL"
          curl -fsSL "$URL/" -o /dev/null
